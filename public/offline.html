<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — Xeevia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      padding: 24px;
    }

    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      stroke: #888;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #aaa;
      margin-bottom: 8px;
    }

    .tips {
      margin: 24px 0;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
    }

    .tips p {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tips p:last-child { margin-bottom: 0; }

    .tips span.dot {
      width: 6px;
      height: 6px;
      background: #555;
      border-radius: 50%;
      flex-shrink: 0;
    }

    button {
      margin-top: 8px;
      padding: 12px 32px;
      background: #fff;
      color: #0f0f13;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .brand {
      margin-top: 32px;
      font-size: 12px;
      color: #444;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1"/>
      </svg>
    </div>

    <h1>No internet connection</h1>
    <p>Xeevia needs a connection to load. Your data is safe — you just need to get back online.</p>

    <div class="tips">
      <p><span class="dot"></span> Check your Wi-Fi or mobile data is turned on</p>
      <p><span class="dot"></span> Move closer to your router if on Wi-Fi</p>
      <p><span class="dot"></span> Try turning Airplane mode on and off</p>
      <p><span class="dot"></span> Your progress and data are not lost</p>
    </div>

    <button onclick="window.location.reload()">Try again</button>

    <p class="brand">Xeevia</p>
  </div>
</body>
</html>
