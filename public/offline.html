<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline — Xeevia</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 24px;
    }

    .logo {
      width: 56px;
      height: 56px;
      margin-bottom: 32px;
      opacity: 0.9;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 28px;
      height: 28px;
      stroke: #777;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #ccc;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 13px;
      color: #777;
      margin-bottom: 24px;
    }

    button {
      padding: 10px 28px;
      background: #7CFC00;
      color: #0f0f13;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- 🔥 YOUR LOGO -->
    <img src="/logo192.png" alt="Xeevia" class="logo" />

    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1"/>
      </svg>
    </div>

    <h1>No internet connection</h1>
    <div class="sub">Check your connection and try again.</div>

    <button onclick="retry()">Try again</button>
  </div>

  <script>
    function retry() {
      window.location.reload();
    }

    // Auto reload when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Background check
    setInterval(async () => {
      try {
        await fetch('/', { method: 'HEAD', cache: 'no-store' });
        window.location.reload();
      } catch (e) {}
    }, 5000);
  </script>
</body>
</html>
