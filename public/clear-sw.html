<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Xeevia — Refreshing…</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000000;
      color: #e6ebe6;
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      text-align: center;
    }

    .logo {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #a3e635, #4d7c0f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(163, 230, 53, 0.15);
      border-top-color: #a3e635;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      font-size: 15px;
      font-weight: 600;
      color: #e6ebe6;
    }

    .sub {
      font-size: 12px;
      color: #444;
      max-width: 280px;
      line-height: 1.7;
    }

    .done-icon {
      font-size: 40px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">XEEVIA</div>
    <div class="spinner" id="spinner"></div>
    <div class="done-icon" id="done">✅</div>
    <div class="msg" id="msg">Clearing cached data…</div>
    <div class="sub" id="sub">This only takes a moment. You will be redirected automatically.</div>
  </div>

  <script>
    (async function () {
      const msgEl  = document.getElementById("msg");
      const subEl  = document.getElementById("sub");
      const spinner = document.getElementById("spinner");
      const done   = document.getElementById("done");

      function step(text) {
        msgEl.textContent = text;
      }

      try {
        // Step 1 — Unregister all service workers
        step("Removing stale service workers…");
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function (r) { return r.unregister(); }));
        }

        // Step 2 — Delete all caches
        step("Clearing cached files…");
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(function (k) { return caches.delete(k); }));
        }

        // Step 3 — Done, redirect
        step("Done! Loading Xeevia…");
        subEl.textContent = "Redirecting you to the app now.";
        spinner.style.display = "none";
        done.style.display = "block";

        setTimeout(function () {
          window.location.replace("/");
        }, 1200);

      } catch (err) {
        // Even if something fails, still redirect
        step("Redirecting…");
        subEl.textContent = "";
        setTimeout(function () {
          window.location.replace("/");
        }, 800);
      }
    })();
  </script>
</body>
</html>
