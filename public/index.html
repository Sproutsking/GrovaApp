<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.png" />

    <!--
      viewport-fit=cover: extends the viewport into the status bar (top)
      and gesture navigation bar (bottom). Without this, env() safe area
      values are always 0 and the system bars remain unpainted.
    -->
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />

    <!--
      color-scheme: dark — tells Chrome 135+ edge-to-edge engine that this
      app is dark. Chrome uses this to paint the new "chin" (gesture nav bar
      overlay) in a dark color. Combined with #000000 background on html,
      the chin becomes invisible against the app.
    -->
    <meta name="color-scheme" content="dark" />

    <!--
      Three theme-color declarations — Chrome reads all three:
      • media light  → black
      • media dark   → black
      • no media     → black fallback
      All pure #000000 so the Android status bar area is invisible
      against the app header in standalone mode.
    -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#000000" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      black-translucent: extends iOS viewport under the status bar.
      env(safe-area-inset-top/bottom) return real values only with this.
    -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Xeevia" />

    <meta name="description" content="New social experience." />
    <meta property="og:title" content="Xeevia — Own Your Social" />
    <meta property="og:description" content="Own your content. Build your network. Engage to Earn" />
    <meta property="og:type" content="website" />
    <meta name="application-name" content="Xeevia" />

    <link rel="preload" as="image" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
  html, body {
    background: #000000;
  }
</style>

    <style>
      *, *::before, *::after {
        margin: 0; padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      /*
        Pure #000000 on html — Android Chrome 135+ edge-to-edge paints
        the gesture navigation bar ("chin") using the html background color.
        Any value other than pure black shows as a visible strip.
        overscroll-behavior: none stops rubber-band bounce from exposing
        background color above or below the page.
      */
      html {
        width: 100%;
        height: 100%;
        background: #000000;
        color-scheme: dark;
        -webkit-text-size-adjust: 100%;
        overscroll-behavior: none;
      }

      body {
        width: 100%;
        height: 100%;
        background: #000000;
        color: #e6ebe6;
        font-family: "DM Sans", -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        overscroll-behavior: none;
      }

      input, textarea, select {
        font-size: 16px !important;
      }

      #root {
        min-height: 100dvh;
        background: #000000;
      }

      @keyframes xv_slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Subtle install nudge ── */
      #xv-install {
        position: fixed;
        bottom: calc(80px + env(safe-area-inset-bottom, 0px));
        left: 16px; right: 16px;
        background: rgba(8,8,8,0.98);
        border: 1px solid rgba(168,230,61,0.18);
        border-radius: 18px;
        padding: 16px 18px;
        z-index: 10001;
        display: none;
        align-items: center;
        gap: 14px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        max-width: 480px;
        margin: 0 auto;
      }
      #xv-install.show {
        display: flex;
        animation: xv_slideUp 0.4s cubic-bezier(0.23,1,0.32,1);
      }
      .xvi-icon {
        width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
        background: linear-gradient(135deg,#a8e63d,#3d7800);
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; font-weight: 900; color: #050706;
        font-family: "Bebas Neue", sans-serif; letter-spacing: 1px;
      }
      .xvi-text { flex: 1; min-width: 0; }
      .xvi-title { font-size: 13px; font-weight: 700; color: #e6ebe6; margin-bottom: 2px; }
      .xvi-sub   { font-size: 11px; color: #3a4a3a; }
      .xvi-btn {
        padding: 9px 18px; border-radius: 100px; border: none;
        font-size: 12px; font-weight: 800; cursor: pointer;
        background: linear-gradient(135deg,#a8e63d,#5a9a10);
        color: #040604; font-family: inherit; flex-shrink: 0;
        white-space: nowrap;
      }
      .xvi-dismiss {
        width: 28px; height: 28px; border-radius: 50%; border: none;
        background: rgba(255,255,255,0.05); color: #3a4a3a;
        font-size: 16px; cursor: pointer; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-family: inherit;
      }

      /* ── Update card — same design as install nudge ── */
      #xv-update-card {
        position: fixed;
        bottom: calc(80px + env(safe-area-inset-bottom, 0px));
        left: 16px; right: 16px;
        background: rgba(8,8,8,0.98);
        border: 1px solid rgba(168,230,61,0.18);
        border-radius: 18px;
        padding: 16px 18px;
        z-index: 10002;
        display: none;
        align-items: center;
        gap: 14px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        max-width: 480px;
        margin: 0 auto;
      }
      #xv-update-card.show {
        display: flex;
        animation: xv_slideUp 0.4s cubic-bezier(0.23,1,0.32,1);
      }

      /* ── SW update banner ── */
      #xv-update {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(0,0,0,0.97);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-top: 1px solid rgba(168,230,61,0.14);
        padding: 16px 20px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
        z-index: 10000;
        display: none;
      }
      #xv-update.show {
        display: block;
        animation: xv_slideUp 0.38s cubic-bezier(0.23,1,0.32,1);
      }
      .xvu-inner {
        max-width: 500px; margin: 0 auto;
        display: flex; align-items: center; gap: 14px;
      }
      .xvu-icon {
        width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
        background: linear-gradient(135deg,#a8e63d,#4d8800);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px;
      }
      .xvu-text { flex: 1; }
      .xvu-title { font-size: 14px; font-weight: 600; color: #e6ebe6; margin-bottom: 2px; }
      .xvu-sub   { font-size: 12px; color: #4a6a2a; }
      .xvu-btn {
        padding: 10px 20px; border-radius: 100px; border: none;
        font-size: 13px; font-weight: 700; cursor: pointer;
        background: linear-gradient(135deg,#a8e63d,#5a9a10);
        color: #040604; font-family: inherit;
        transition: transform 0.15s; flex-shrink: 0;
      }
      .xvu-btn:hover { transform: scale(1.04); }

      /* ── Snooze picker buttons ── */
      .xvc-snooze-btn {
        flex: 1; padding: 9px 0; border-radius: 10px;
        font-size: 12px; font-weight: 700; cursor: pointer;
        background: rgba(132,204,22,0.08);
        border: 1px solid rgba(132,204,22,0.2);
        color: #84cc16; font-family: inherit;
        transition: background 0.15s, border-color 0.15s;
      }
      .xvc-snooze-btn:active {
        background: rgba(132,204,22,0.18);
        border-color: rgba(132,204,22,0.4);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Xeevia.</noscript>
    <div id="root"></div>

    <!-- Update card — smart snooze flow -->
    <div id="xv-update-card" role="complementary" aria-label="Update Xeevia">
      <!-- Default view: Update + Later -->
      <div id="xvc-main" style="display:flex;align-items:center;gap:14px;width:100%;">
        <div class="xvi-icon" aria-hidden="true">✦</div>
        <div class="xvi-text">
          <div class="xvi-title">Update available for Xeevia</div>
        </div>
        <button id="xvc-update-btn" class="xvi-btn">Update</button>
        <button id="xvc-later-btn" class="xvi-dismiss" aria-label="Later" style="font-size:10px;font-weight:700;width:auto;padding:0 10px;border-radius:8px;color:#84cc16;background:rgba(132,204,22,0.08);border:1px solid rgba(132,204,22,0.2);">Later</button>
      </div>
      <!-- Snooze picker — shown after tapping Later -->
      <div id="xvc-snooze" style="display:none;width:100%;">
        <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:10px;letter-spacing:0.3px;">REMIND ME IN</div>
        <div style="display:flex;gap:8px;width:100%;">
          <button class="xvc-snooze-btn" data-hours="6">6 hrs</button>
          <button class="xvc-snooze-btn" data-hours="12">12 hrs</button>
          <button class="xvc-snooze-btn" data-hours="24">Tomorrow</button>
        </div>
      </div>
    </div>

    <!-- Subtle install nudge — never blocks the app -->
    <div id="xv-install" role="complementary" aria-label="Install Xeevia">
      <div class="xvi-icon" aria-hidden="true">X</div>
      <div class="xvi-text">
        <div class="xvi-title">Add Xeevia to your home screen</div>
      </div>
      <button id="xvi-btn" class="xvi-btn">Install</button>
      <button id="xvi-dismiss" class="xvi-dismiss" aria-label="Dismiss">✕</button>
    </div>

    <!-- SW update banner -->
    <div id="xv-update" role="alert" aria-live="polite">
      <div class="xvu-inner">
        <div class="xvu-icon" aria-hidden>✦</div>
        <div class="xvu-text">
          <div class="xvu-title">New version ready</div>
          <div class="xvu-sub">Tap to get the latest features</div>
        </div>
        <button id="xv-update-btn" class="xvu-btn">Update</button>
      </div>
    </div>

    <script>
      (function () {
        var deferred = null;
        var STORAGE_KEY = "xv_install_dismissed";

        function isStandalone() {
          return (
            window.matchMedia("(display-mode: standalone)").matches ||
            window.navigator.standalone === true ||
            document.referrer.includes("android-app://")
          );
        }

        function shouldShow() {
          if (localStorage.getItem(STORAGE_KEY)) return false;
          if (isStandalone()) return false;
          return true;
        }

        window.addEventListener("beforeinstallprompt", function (e) {
          e.preventDefault();
          deferred = e;
          if (shouldShow()) {
            setTimeout(function () {
              document.getElementById("xv-install").classList.add("show");
            }, 10000);
          }
        });

        document.getElementById("xvi-btn").addEventListener("click", function () {
          document.getElementById("xv-install").classList.remove("show");
          if (deferred) {
            deferred.prompt();
            deferred.userChoice.then(function () { deferred = null; });
          }
        });

        document.getElementById("xvi-dismiss").addEventListener("click", function () {
          document.getElementById("xv-install").classList.remove("show");
          try { localStorage.setItem(STORAGE_KEY, "1"); } catch (e) {}
        });

        document.getElementById("xv-update-btn").addEventListener("click", function () {
          window.location.reload();
        });

        // ── Update card with smart snooze ────────────────────────────────
        var UPDATE_SNOOZE_KEY = "xv_update_snooze_until";

        var isLocalhost = Boolean(
          window.location.hostname === "localhost" ||
          window.location.hostname === "[::1]" ||
          window.location.hostname.match(/^127(?:\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}$/)
        );

        function doUpdate() {
          if (navigator.serviceWorker && !isLocalhost) {
            navigator.serviceWorker.getRegistration().then(function (reg) {
              if (reg && reg.waiting) {
                reg.waiting.postMessage({ type: "SKIP_WAITING" });
              }
            });
          }
          if ("caches" in window) {
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }).then(function () { window.location.reload(true); });
          } else {
            window.location.reload(true);
          }
        }

        function hideUpdateCard() {
          var card = document.getElementById("xv-update-card");
          card.classList.remove("show");
          // Reset back to main view for next time
          setTimeout(function () {
            document.getElementById("xvc-main").style.display = "flex";
            document.getElementById("xvc-snooze").style.display = "none";
          }, 400);
        }

        function showUpdateCard() {
          // Check if snoozed
          try {
            var snoozeUntil = localStorage.getItem(UPDATE_SNOOZE_KEY);
            if (snoozeUntil && Date.now() < Number(snoozeUntil)) return;
            localStorage.removeItem(UPDATE_SNOOZE_KEY);
          } catch (e) {}
          document.getElementById("xv-update-card").classList.add("show");
        }

        // Update button — full cache clear + reload
        document.getElementById("xvc-update-btn").addEventListener("click", doUpdate);

        // Later button — show snooze picker
        document.getElementById("xvc-later-btn").addEventListener("click", function () {
          document.getElementById("xvc-main").style.display = "none";
          document.getElementById("xvc-snooze").style.display = "block";
        });

        // Snooze buttons — store wakeup time, hide card, reschedule check
        document.querySelectorAll(".xvc-snooze-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var hours = Number(btn.getAttribute("data-hours"));
            var wakeAt = Date.now() + hours * 60 * 60 * 1000;
            try { localStorage.setItem(UPDATE_SNOOZE_KEY, String(wakeAt)); } catch (e) {}
            hideUpdateCard();
            // Re-check after the chosen period and show card again if SW still waiting
            setTimeout(function () {
              if (navigator.serviceWorker && !isLocalhost) {
                navigator.serviceWorker.getRegistration().then(function (reg) {
                  if (reg && reg.waiting) showUpdateCard();
                });
              }
            }, hours * 60 * 60 * 1000);
          });
        });

        window.__xvShowUpdate = function () { showUpdateCard(); };
      })();
    </script>
  </body>
</html>
