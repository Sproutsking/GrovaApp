<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.png" />

    <!--
      viewport-fit=cover: extends the viewport into the status bar (top)
      and gesture navigation bar (bottom). Without this, env() safe area
      values are always 0 and the system bars remain unpainted.
    -->
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />

    <!--
      color-scheme: dark — tells Chrome 135+ edge-to-edge engine that this
      app is dark. Chrome uses this to paint the new "chin" (gesture nav bar
      overlay) in a dark color.
    -->
    <meta name="color-scheme" content="dark" />

    <!-- All black theme-color so Android status bar is invisible -->
    <meta
      name="theme-color"
      content="#000000"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#000000"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="theme-color" content="#000000" />

    <script>
      (function() {
        try {
          var m = localStorage.getItem('xv_theme_mode');
          if (m === 'light' || m === 'dark') {
            document.documentElement.classList.add('theme-' + m);
            document.documentElement.style.colorScheme = m;
            document.documentElement.style.backgroundColor = m === 'light' ? '#f7f8fb' : '#000000';
            document.documentElement.style.color = m === 'light' ? '#0f172a' : '#e6ebe6';
            var body = document.body || document.documentElement;
            body.style.backgroundColor = m === 'light' ? '#f7f8fb' : '#000000';
            body.style.color = m === 'light' ? '#0f172a' : '#e6ebe6';
          }
        } catch (e) {
          // Ignore localStorage access failures
        }
      })();
    </script>

    <!-- PWA standalone flags — these are what make it look like a native app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      black-translucent: extends iOS viewport under the status bar.
      env(safe-area-inset-top/bottom) return real values only with this.
    -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <!--
      THIS IS THE KEY TAG that sets the app name in the iOS/Android task
      switcher and home screen label. Must be "Xeevia" not the page title.
    -->
    <meta name="apple-mobile-web-app-title" content="Xeevia" />
    <meta name="application-name" content="Xeevia" />

    <!-- SEO / sharing -->
    <meta
      name="description"
      content="Own your content. Build your network. Engage to Earn."
    />
    <meta property="og:title" content="Xeevia — Own Your Social" />
    <meta
      property="og:description"
      content="Own your content. Build your network. Engage to Earn."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo512.png" />

    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!--
      CRITICAL: Pure black on html + body so Android Chrome edge-to-edge
      paints the gesture navigation bar ("chin") black = invisible.
    -->
    <style>
      /* Initial theme variables for first paint (dark defaults). This ensures
         the app shell and install/update prompts are theme-aware before
         bundled CSS loads. */
      :root {
        --bg: #000000;
        --bg-strong: #070707;
        --panel: #111111;
        --panel-strong: #0b0b0b;
        --surface: rgba(255,255,255,0.04);
        --surface-overlay: rgba(255,255,255,0.04);
        --surface-border: rgba(255,255,255,0.1);
        --text: #e6ebe6;
        --text-secondary: #cbd5e1;
        --accent: #84cc16;
        --accent-border: rgba(132,204,22,0.18);
        --accent-gradient: linear-gradient(135deg, #84cc16, #65a30d);
        --accent-bg-soft: rgba(132,204,22,0.08);
        --shadow: rgba(0,0,0,0.6);
        --danger: #ff4444;
      }
      .theme-light {
        --bg: #f4f6fb;
        --bg-strong: #ffffff;
        --panel: #ffffff;
        --panel-strong: #fbfcff;
        --surface: rgba(15,23,42,0.04);
        --surface-overlay: rgba(15,23,42,0.04);
        --surface-border: rgba(15,23,42,0.12);
        --text: #0f172a;
        --text-secondary: #334155;
        --accent: #16a34a;
        --accent-border: rgba(22,163,74,0.12);
        --accent-gradient: linear-gradient(135deg, #16a34a, #15803d);
        --accent-bg-soft: rgba(22,163,74,0.08);
        --shadow: rgba(15,23,42,0.12);
        --danger: #ff4444;
      }

      html, body { background: var(--bg); }
    </style>

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color-scheme: dark;
        -webkit-text-size-adjust: 100%;
        overscroll-behavior: none;
      }

      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          "DM Sans",
          -apple-system,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        overscroll-behavior: none;
        /* Prevent pull-to-refresh showing white flash */
        overscroll-behavior-y: contain;
      }

      input,
      textarea,
      select {
        font-size: 16px !important;
      }

      #root {
        min-height: 100dvh;
        background: var(--bg);
      }

      .xv-shell {
        width: 100%;
        min-height: 100dvh;
        background: var(--panel);
        color: var(--text);
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 20px;
      }
      .xv-shell-header {
        height: 62px;
        border-radius: 18px;
        background: var(--surface);
      }
      .xv-shell-body {
        display: grid;
        grid-template-columns: minmax(200px, 240px) minmax(0, 1fr) minmax(220px, 280px);
        gap: 14px;
        flex: 1;
      }
      .xv-shell-sidebar,
      .xv-shell-trending {
        border-radius: 20px;
        background: var(--surface);
        min-height: 420px;
      }
      .xv-shell-main {
        display: grid;
        gap: 14px;
      }
      .xv-shell-row {
        height: 160px;
        border-radius: 20px;
        background: var(--surface-muted);
      }
      .xv-shell-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .xv-shell-card {
        height: 120px;
        border-radius: 18px;
        background: var(--surface);
      }
      @media (max-width: 960px) {
        .xv-shell-body {
          grid-template-columns: 1fr;
        }
        .xv-shell-trending {
          display: none;
        }
      }
    </style>

    <style>
      @keyframes xv_slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Subtle install nudge ── */
      #xv-install {
        position: fixed;
        bottom: calc(80px + env(safe-area-inset-bottom, 0px));
        left: 16px;
        right: 16px;
        background: var(--panel-strong);
        border: 1px solid var(--accent-border);
        border-radius: 18px;
        padding: 16px 18px;
        z-index: 10001;
        display: none;
        align-items: center;
        gap: 14px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 8px 40px var(--shadow);
        max-width: 480px;
        margin: 0 auto;
      }
      #xv-install.show {
        display: flex;
        animation: xv_slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .xvi-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        flex-shrink: 0;
        background: var(--accent-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 900;
        color: var(--accent-contrast);
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 1px;
      }
      .xvi-text {
        flex: 1;
        min-width: 0;
      }
      .xvi-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 2px;
      }
      .xvi-sub {
        font-size: 11px;
        color: var(--text-secondary);
      }
      .xvi-btn {
        padding: 9px 18px;
        border-radius: 100px;
        border: none;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        background: var(--accent-gradient);
        color: var(--accent-contrast);
        font-family: inherit;
        flex-shrink: 0;
        white-space: nowrap;
      }
      .xvi-dismiss {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: none;
        background: var(--surface-overlay);
        color: var(--text-secondary);
        font-size: 16px;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: inherit;
      }

      /* ── Update card — same design as install nudge ── */
      #xv-update-card {
        position: fixed;
        bottom: calc(80px + env(safe-area-inset-bottom, 0px));
        left: 16px;
        right: 16px;
        background: var(--panel-strong);
        border: 1px solid var(--accent-border);
        border-radius: 18px;
        padding: 16px 18px;
        z-index: 10002;
        display: none;
        align-items: center;
        gap: 14px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 8px 40px var(--shadow);
        max-width: 480px;
        margin: 0 auto;
      }
      #xv-update-card.show {
        display: flex;
        animation: xv_slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }

      /* ── SW update banner ── */
      #xv-update {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--panel-strong);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-top: 1px solid var(--accent-border);
        padding: 16px 20px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
        z-index: 10000;
        display: none;
      }
      #xv-update.show {
        display: block;
        animation: xv_slideUp 0.38s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .xvu-inner {
        max-width: 500px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .xvu-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        flex-shrink: 0;
        background: var(--accent-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .xvu-text {
        flex: 1;
      }
      .xvu-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 2px;
      }
      .xvu-sub {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .xvu-btn {
        padding: 10px 20px;
        border-radius: 100px;
        border: none;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent-gradient);
        color: var(--accent-contrast);
        font-family: inherit;
        transition: transform 0.15s;
        flex-shrink: 0;
      }
      .xvu-btn:hover {
        transform: scale(1.04);
      }

      /* ── Snooze picker buttons ── */
      .xvc-snooze-btn {
        flex: 1;
        padding: 9px 0;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent-bg-soft);
        border: 1px solid var(--accent-border);
        color: var(--accent);
        font-family: inherit;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .xvc-snooze-btn:active {
        background: var(--accent-bg-strong);
        border-color: var(--accent-border-strong, var(--accent-border));
      }
    </style>

    <!--
      STANDALONE ENFORCEMENT SCRIPT
      ─────────────────────────────
      When a user opens app.xeevia.com directly in Chrome (not from the home
      screen icon), the PWA runs inside a browser tab and shows the URL bar.
      This script detects that situation and redirects them to a special intent
      URL that Android resolves to the installed PWA in standalone mode.

      HOW IT WORKS:
        1. If already in standalone / fullscreen / TWA → do nothing (we're good).
        2. If the PWA is installed (we can't detect this 100% from JS, but we
           check localStorage for a flag set after a successful install prompt
           acceptance), redirect via the intent:// URL which Android routes
           directly to the installed app window.
        3. If the PWA is NOT installed → let the page load normally so the
           install prompt can appear.

      WHY intent:// AND NOT window.location?
        A normal JS redirect still opens the destination inside Chrome.
        The intent:// scheme tells Android to hand the URL to the app that
        owns it — which, for an installed PWA, is Chrome in standalone mode
        (separate app window, no URL bar).
    -->
    <script>
      (function () {
        function isStandalone() {
          return (
            window.matchMedia("(display-mode: standalone)").matches ||
            window.matchMedia("(display-mode: fullscreen)").matches ||
            window.navigator.standalone === true ||
            document.referrer.startsWith("android-app://")
          );
        }

        // Already running standalone — nothing to do.
        if (isStandalone()) return;

        // Only attempt the intent redirect on Android Chrome.
        var isAndroid = /Android/i.test(navigator.userAgent);
        var isChrome =
          /Chrome/i.test(navigator.userAgent) &&
          !/Edg|OPR|Samsung/i.test(navigator.userAgent);
        if (!isAndroid || !isChrome) return;

        // Only redirect if the user has previously accepted the install prompt
        // (meaning the PWA is installed). Without this guard we'd redirect
        // users who haven't installed yet and they'd get an error page.
        var installed = false;
        try {
          installed = !!localStorage.getItem("xv_install_dismissed");
        } catch (_) {}
        if (!installed) return;

        // Build the intent URL for the current path so deep links work.
        var path =
          window.location.pathname +
          window.location.search +
          window.location.hash;
        var intentUrl =
          "intent://app.xeevia.com" +
          path +
          "#Intent;" +
          "scheme=https;" +
          "action=android.intent.action.VIEW;" +
          "category=android.intent.category.BROWSABLE;" +
          "package=com.android.chrome;" +
          "S.browser_fallback_url=" +
          encodeURIComponent("https://app.xeevia.com" + path) +
          ";end";

        window.location.replace(intentUrl);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Xeevia.</noscript>
    <div id="root">
      <div class="xv-shell" aria-hidden="true">
        <div class="xv-shell-header"></div>
        <div class="xv-shell-body">
          <div class="xv-shell-sidebar"></div>
          <div class="xv-shell-main">
            <div class="xv-shell-row"></div>
            <div class="xv-shell-grid">
              <div class="xv-shell-card"></div>
              <div class="xv-shell-card"></div>
            </div>
            <div class="xv-shell-row"></div>
          </div>
          <div class="xv-shell-trending"></div>
        </div>
      </div>
    </div>

    <!-- Update card — smart snooze flow -->
    <div id="xv-update-card" role="complementary" aria-label="Update Xeevia">
      <div
        id="xvc-main"
        style="display: flex; align-items: center; gap: 14px; width: 100%"
      >
        <div style="width:24px;height:24px;flex-shrink:0;border-radius:6px;overflow:hidden;background:var(--accent-bg-soft);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center">
          <img src="/logo192.png" alt="Xeevia" style="width:16px;height:16px;object-fit:contain"/>
        </div>
        <div class="xvi-text">
          <div class="xvi-title">Update available for Xeevia</div>
        </div>
        <button id="xvc-update-btn" class="xvi-btn">Update</button>
        <button
          id="xvc-later-btn"
          class="xvi-dismiss"
          aria-label="Later"
          style="
            font-size: 10px;
            font-weight: 700;
            width: auto;
            padding: 0 10px;
            border-radius: 8px;
            color: var(--accent);
            background: var(--accent-bg-soft);
            border: 1px solid var(--accent-border);
          "
        >
          Later
        </button>
      </div>
      <div id="xvc-snooze" style="display: none; width: 100%">
        <div
          style="
            font-size: 11px;
            font-weight: 700;
            color: #555;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
          "
        >
          REMIND ME IN
        </div>
        <div style="display: flex; gap: 8px; width: 100%">
          <button class="xvc-snooze-btn" data-hours="6">6 hrs</button>
          <button class="xvc-snooze-btn" data-hours="12">12 hrs</button>
          <button class="xvc-snooze-btn" data-hours="24">Tomorrow</button>
        </div>
      </div>
    </div>

    <!-- Subtle install nudge — never blocks the app -->
    <div id="xv-install" role="complementary" aria-label="Install Xeevia">
      <div style="width:24px;height:24px;flex-shrink:0;border-radius:6px;overflow:hidden;background:rgba(132,204,22,.1);border:1px solid rgba(132,204,22,.2);display:flex;align-items:center;justify-content:center">
        <img src="/logo192.png" alt="Xeevia" style="width:16px;height:16px;object-fit:contain"/>
      </div>
      <div class="xvi-text">
        <div class="xvi-title">Add Xeevia to your home screen</div>
      </div>
      <button id="xvi-btn" class="xvi-btn">Install</button>
      <button id="xvi-dismiss" class="xvi-dismiss" aria-label="Dismiss" style="display:none">
        ✕
      </button>
    </div>

    <!-- SW update banner -->
    <div id="xv-update" role="alert" aria-live="polite">
      <div class="xvu-inner">
        <div class="xvu-icon" aria-hidden>✦</div>
        <div class="xvu-text">
          <div class="xvu-title">New version ready</div>
          <div class="xvu-sub">Tap to get the latest features</div>
        </div>
        <button id="xv-update-btn" class="xvu-btn">Update</button>
      </div>
    </div>

    <script>
      (function () {
        // ── Detect standalone mode ──────────────────────────────────────────
        function isStandalone() {
          return (
            window.matchMedia("(display-mode: standalone)").matches ||
            window.matchMedia("(display-mode: fullscreen)").matches ||
            window.navigator.standalone === true ||
            document.referrer.includes("android-app://")
          );
        }

        // ── Install prompt ──────────────────────────────────────────────────
        var deferred = null;
        var STORAGE_KEY = "xv_install_dismissed";

        function shouldShow() {
          if (localStorage.getItem(STORAGE_KEY)) return false;
          if (isStandalone()) return false;
          return true;
        }

        window.addEventListener("beforeinstallprompt", function (e) {
          e.preventDefault();
          deferred = e;
          if (shouldShow()) {
            setTimeout(function () {
              document.getElementById("xv-install").classList.add("show");
            }, 8000);
          }
        });

        document
          .getElementById("xvi-btn")
          .addEventListener("click", function () {
            document.getElementById("xv-install").classList.remove("show");
            if (deferred) {
              deferred.prompt();
              deferred.userChoice.then(function (result) {
                deferred = null;
                if (result.outcome === "accepted") {
                  try {
                    localStorage.setItem(STORAGE_KEY, "1");
                  } catch (e) {}
                }
              });
            }
          });

        document
          .getElementById("xvi-dismiss")
          .addEventListener("click", function () {
            document.getElementById("xv-install").classList.remove("show");
            try {
              localStorage.setItem(STORAGE_KEY, "1");
            } catch (e) {}
          });

        document
          .getElementById("xv-update-btn")
          .addEventListener("click", function () {
            window.location.reload();
          });

        // ── Update card with smart snooze ───────────────────────────────────
        var UPDATE_SNOOZE_KEY = "xv_update_snooze_until";

        var isLocalhost = Boolean(
          window.location.hostname === "localhost" ||
          window.location.hostname === "[::1]" ||
          window.location.hostname.match(
            /^127(?:\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}$/,
          ),
        );

        function doUpdate() {
          // SET FLAG FIRST - before any async code
          try { 
            localStorage.setItem("xv_update_in_progress", "1");
            localStorage.setItem("xv_update_timestamp", String(Date.now()));
          } catch(e) {}
          
          if (navigator.serviceWorker && !isLocalhost) {
            navigator.serviceWorker.getRegistration().then(function (reg) {
              if (reg && reg.waiting) {
                reg.waiting.postMessage({ type: "SKIP_WAITING" });
              }
            });
          }
          if ("caches" in window) {
            caches
              .keys()
              .then(function (keys) {
                return Promise.all(
                  keys.map(function (k) {
                    return caches.delete(k);
                  }),
                );
              })
              .then(function () {
                window.location.reload(true);
              });
          } else {
            window.location.reload(true);
          }
        }
        (function() {
          try {
            var updateFlag = localStorage.getItem("xv_update_in_progress");
            var updateTime = localStorage.getItem("xv_update_timestamp");
            // Check if update happened within last 10 seconds (page load cycle)
            if (updateFlag && updateTime && (Date.now() - Number(updateTime)) < 10000) {
              localStorage.removeItem("xv_update_in_progress");
              localStorage.removeItem("xv_update_timestamp");
              // Hide card immediately
              var card = document.getElementById("xv-update-card");
              if (card) {
                card.classList.remove("show");
                card.style.display = "none";
              }
            }
          } catch (e) {}
        })();

        function hideUpdateCard() {
          var card = document.getElementById("xv-update-card");
          card.classList.remove("show");
          setTimeout(function () {
            document.getElementById("xvc-main").style.display = "flex";
            document.getElementById("xvc-snooze").style.display = "none";
          }, 400);
        }

        function showUpdateCard() {
          try {
            // Don't show if update just happened
            var updateFlag = localStorage.getItem("xv_update_in_progress");
            var updateTime = localStorage.getItem("xv_update_timestamp");
            if (updateFlag || (updateTime && (Date.now() - Number(updateTime)) < 5000)) {
              return;
            }
            
            var snoozeUntil = localStorage.getItem(UPDATE_SNOOZE_KEY);
            if (snoozeUntil && Date.now() < Number(snoozeUntil)) return;
            localStorage.removeItem(UPDATE_SNOOZE_KEY);
          } catch (e) {}
          document.getElementById("xv-update-card").classList.add("show");
        }

        document
          .getElementById("xvc-update-btn")
          .addEventListener("click", doUpdate);

        document
          .getElementById("xvc-later-btn")
          .addEventListener("click", function () {
            document.getElementById("xvc-main").style.display = "none";
            document.getElementById("xvc-snooze").style.display = "block";
          });

        document.querySelectorAll(".xvc-snooze-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var hours = Number(btn.getAttribute("data-hours"));
            var wakeAt = Date.now() + hours * 60 * 60 * 1000;
            try {
              localStorage.setItem(UPDATE_SNOOZE_KEY, String(wakeAt));
            } catch (e) {}
            hideUpdateCard();
            setTimeout(
              function () {
                if (navigator.serviceWorker && !isLocalhost) {
                  navigator.serviceWorker
                    .getRegistration()
                    .then(function (reg) {
                      if (reg && reg.waiting) showUpdateCard();
                    });
                }
              },
              hours * 60 * 60 * 1000,
            );
          });
        });

        window.__xvShowUpdate = function () {
          showUpdateCard();
        };

        // ── Set document title to just "Xeevia" ────────────────────────────
        // This controls what shows in the Android task switcher when running
        // as a PWA. Keep it short and branded.
        document.title = "Xeevia";
      })();
    </script>
  </body>
</html>
